<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SGRR&LAW</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<style>
:root{
  --bg:#0a0a0a;
  --bg-2:#141414;
  --bg-3:#1c1c1c;
  --bg-hover:#222;
  --border:#262626;
  --text:#ededed;
  --text-2:#a1a1a1;
  --text-3:#6b6b6b;
  --accent:#fb923c;
  --accent-2:#f97316;
  --danger:#ef4444;
  --success:#10b981;
  --shadow:0 8px 32px rgba(0,0,0,.5);
  --r:10px;
  --r-sm:6px;
  --transition:.18s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:15px;
  line-height:1.6;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;background:none;border:none;color:inherit;outline:none;width:100%}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

/* LOGIN */
#login-screen{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at top,#1a1a1a 0%,var(--bg) 70%);
  z-index:1000;
  padding:20px;
}
.login-card{
  background:var(--bg-2);
  border:1px solid var(--border);
  border-radius:16px;
  padding:40px 32px;
  max-width:400px;width:100%;
  box-shadow:var(--shadow);
}
.logo{
  font-size:42px;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;margin-bottom:8px;letter-spacing:-1px;
}
.logo-sub{text-align:center;color:var(--text-2);font-size:13px;margin-bottom:32px}
.login-input{
  width:100%;padding:14px 16px;
  background:var(--bg-3);border:1px solid var(--border);
  border-radius:var(--r);font-size:15px;
  margin-bottom:12px;
  transition:border var(--transition);
}
.login-input:focus{border-color:var(--accent)}
.btn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:#000;font-weight:600;font-size:15px;
  border-radius:var(--r);
  transition:transform var(--transition),opacity var(--transition);
}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(0);opacity:.9}
.btn-ghost{
  background:var(--bg-3);color:var(--text);
  border:1px solid var(--border);
}
.btn-ghost:hover{background:var(--bg-hover)}
.login-divider{
  display:flex;align-items:center;gap:12px;
  color:var(--text-3);font-size:12px;
  margin:20px 0;
}
.login-divider::before,.login-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}
.login-toggle{
  text-align:center;margin-top:20px;
  color:var(--text-2);font-size:14px;
}
.login-error{
  background:rgba(239,68,68,.1);
  border:1px solid rgba(239,68,68,.3);
  color:var(--danger);
  padding:10px;border-radius:var(--r-sm);
  font-size:13px;margin-bottom:12px;
  display:none;
}
.login-error.show{display:block}

/* APP LAYOUT */
#app{display:none;height:100vh;height:100dvh;flex-direction:column}
#app.show{display:flex}
.app-shell{display:flex;flex:1;overflow:hidden;position:relative}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:var(--bg-2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  transition:transform var(--transition);
  z-index:50;
}
.sidebar-header{
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.user-chip{
  display:flex;align-items:center;gap:10px;flex:1;
  min-width:0;
}
.avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:flex;align-items:center;justify-content:center;
  color:#000;font-weight:700;font-size:13px;flex-shrink:0;
}
.user-info{min-width:0;flex:1}
.user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:var(--text-3)}
.icon-btn{
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-sm);
  color:var(--text-2);
  transition:background var(--transition),color var(--transition);
}
.icon-btn:hover{background:var(--bg-hover);color:var(--text)}
.icon-btn svg{width:18px;height:18px}

.sidebar-search{
  padding:10px 12px;
  border-bottom:1px solid var(--border);
}
.search-box{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;
  background:var(--bg-3);
  border-radius:var(--r-sm);
  font-size:13px;
}
.search-box input{font-size:13px}
.search-box svg{width:14px;height:14px;color:var(--text-3);flex-shrink:0}

.sidebar-section{padding:10px 8px}
.section-title{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 8px;
  font-size:11px;font-weight:600;
  color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;
  margin-bottom:4px;
}
.section-title button{
  width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
  border-radius:4px;color:var(--text-3);
  transition:background var(--transition);
}
.section-title button:hover{background:var(--bg-hover);color:var(--text)}

.page-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 8px;
  border-radius:var(--r-sm);
  font-size:14px;
  cursor:pointer;
  transition:background var(--transition);
  user-select:none;
  position:relative;
}
.page-item:hover{background:var(--bg-hover)}
.page-item.active{background:var(--bg-hover);color:var(--accent)}
.page-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.page-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page-actions{display:none;gap:2px}
.page-item:hover .page-actions{display:flex}
.page-actions button{
  width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  border-radius:4px;color:var(--text-3);
  transition:background var(--transition);
}
.page-actions button:hover{background:var(--border);color:var(--text)}
.page-actions svg{width:14px;height:14px}

.sidebar-footer{
  margin-top:auto;
  padding:12px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.collab-list{
  display:flex;flex:1;
}
.collab-avatar{
  width:24px;height:24px;border-radius:50%;
  background:linear-gradient(135deg,#3b82f6,#1e40af);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:10px;font-weight:700;
  border:2px solid var(--bg-2);
  margin-left:-6px;
}
.collab-avatar:first-child{margin-left:0}

/* MAIN CONTENT */
.main{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;background:var(--bg);
  min-width:0;
}
.main-header{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  z-index:10;
}
.menu-btn{display:none}
.breadcrumb{
  flex:1;font-size:13px;color:var(--text-2);
  display:flex;align-items:center;gap:6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.header-actions{display:flex;gap:4px;align-items:center}
.live-indicator{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--success);
  padding:4px 8px;background:rgba(16,185,129,.1);
  border-radius:20px;
}
.live-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--success);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:.4}
}

/* EDITOR */
.editor{
  flex:1;overflow-y:auto;
  padding:0 0 200px;
  -webkit-overflow-scrolling:touch;
}
.editor-cover{
  height:140px;
  background:linear-gradient(135deg,#fb923c,#ef4444,#a855f7);
  position:relative;
}
.editor-content{
  max-width:760px;
  margin:0 auto;
  padding:20px 60px;
}
.page-icon-big{
  font-size:60px;line-height:1;
  margin:-50px 0 20px;
  cursor:pointer;
  user-select:none;
  transition:transform var(--transition);
}
.page-icon-big:hover{transform:scale(1.1)}
.page-title{
  font-size:40px;font-weight:800;
  letter-spacing:-1px;line-height:1.2;
  background:transparent;border:none;outline:none;
  color:var(--text);
  margin-bottom:30px;width:100%;
  resize:none;overflow:hidden;
}
.page-title::placeholder{color:var(--text-3)}

/* BLOCKS */
.block-list{display:flex;flex-direction:column;gap:2px}
.block{
  position:relative;
  display:flex;align-items:flex-start;gap:4px;
  padding:3px 0;
  border-radius:var(--r-sm);
  transition:background var(--transition);
}
.block-handle{
  display:flex;flex-direction:column;
  opacity:0;
  transition:opacity var(--transition);
  flex-shrink:0;
  margin-top:6px;
}
.block:hover .block-handle{opacity:1}
.handle-btn{
  width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  border-radius:4px;color:var(--text-3);
  transition:background var(--transition);
}
.handle-btn:hover{background:var(--bg-hover);color:var(--text)}
.handle-btn svg{width:14px;height:14px}
.block-content{
  flex:1;min-width:0;
  padding:3px 4px;
  border-radius:4px;
  outline:none;
  word-wrap:break-word;
  white-space:pre-wrap;
}
.block-content:empty::before{
  content:attr(data-placeholder);
  color:var(--text-3);
  pointer-events:none;
}

.block[data-type="h1"] .block-content{font-size:30px;font-weight:700;margin-top:16px;margin-bottom:4px;letter-spacing:-.5px}
.block[data-type="h2"] .block-content{font-size:24px;font-weight:700;margin-top:14px;margin-bottom:4px;letter-spacing:-.3px}
.block[data-type="h3"] .block-content{font-size:19px;font-weight:600;margin-top:12px;margin-bottom:4px}
.block[data-type="quote"] .block-content{
  border-left:3px solid var(--accent);
  padding-left:14px;
  font-style:italic;color:var(--text-2);
}
.block[data-type="callout"] .block-content{
  background:var(--bg-3);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:12px 16px;
  display:flex;gap:10px;
}
.block[data-type="bullet"]{padding-left:8px}
.block[data-type="bullet"] .block-content::before{
  content:'•';margin-right:8px;color:var(--accent);font-weight:700;
}
.block[data-type="todo"] .block-content{display:flex;align-items:flex-start;gap:8px}
.block[data-type="todo"] .block-checkbox{
  width:18px;height:18px;
  border:2px solid var(--text-3);
  border-radius:4px;
  margin-top:3px;flex-shrink:0;
  cursor:pointer;
  transition:all var(--transition);
  display:flex;align-items:center;justify-content:center;
}
.block[data-type="todo"].done .block-checkbox{
  background:var(--accent);border-color:var(--accent);
}
.block[data-type="todo"].done .block-checkbox::after{
  content:'✓';color:#000;font-size:13px;font-weight:700;
}
.block[data-type="todo"].done .block-content-inner{
  text-decoration:line-through;color:var(--text-3);
}
.block[data-type="divider"] .block-content{
  height:1px;background:var(--border);margin:16px 0;padding:0;min-height:1px;
}

/* SLASH MENU */
.slash-menu{
  position:absolute;
  background:var(--bg-3);
  border:1px solid var(--border);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  padding:6px;
  min-width:280px;max-height:340px;
  overflow-y:auto;
  z-index:100;
  display:none;
}
.slash-menu.show{display:block}
.slash-item{
  display:flex;align-items:center;gap:12px;
  padding:8px 10px;
  border-radius:var(--r-sm);
  cursor:pointer;font-size:14px;
  transition:background var(--transition);
}
.slash-item:hover,.slash-item.active{background:var(--bg-hover)}
.slash-icon{
  width:32px;height:32px;
  background:var(--bg-2);
  border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.slash-info{flex:1;min-width:0}
.slash-name{font-weight:500}
.slash-desc{font-size:12px;color:var(--text-3)}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--bg-3);
  border:1px solid var(--border);
  padding:12px 20px;
  border-radius:var(--r);
  box-shadow:var(--shadow);
  font-size:14px;
  z-index:200;
  transition:transform var(--transition);
  display:flex;align-items:center;gap:10px;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--success)}
.toast.error{border-color:var(--danger)}

/* EMPTY STATE */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--text-3);
  text-align:center;padding:40px;
}
.empty-state h2{font-size:24px;margin-bottom:8px;color:var(--text)}
.empty-state p{margin-bottom:20px}

/* MOBILE */
.sidebar-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  z-index:40;
}
.sidebar-overlay.show{display:block}

@media (max-width:768px){
  .sidebar{
    position:fixed;top:0;bottom:0;left:0;
    transform:translateX(-100%);
    box-shadow:var(--shadow);
  }
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:flex}
  .editor-content{padding:16px 20px}
  .page-title{font-size:30px}
  .editor-cover{height:80px}
  .page-icon-big{font-size:48px;margin:-30px 0 16px}
  .block[data-type="h1"] .block-content{font-size:24px}
  .block[data-type="h2"] .block-content{font-size:20px}
  .block[data-type="h3"] .block-content{font-size:17px}
  .block-handle{display:none}
  .block-content{font-size:16px}
  .login-card{padding:32px 24px}
}

@supports(padding:max(0px)){
  .sidebar-header{padding-top:max(14px,env(safe-area-inset-top))}
  .main-header{padding-top:max(10px,env(safe-area-inset-top))}
}

::selection{background:rgba(251,146,60,.3);color:var(--text)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.block,.page-item{animation:fadeIn .2s ease-out}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">⚡ SGRR&LAW</div>
    <div class="logo-sub">Workspace de projet — collaboratif & temps réel</div>
    <div id="login-error" class="login-error"></div>
    <input id="email" type="email" class="login-input" placeholder="Email" autocomplete="email">
    <input id="password" type="password" class="login-input" placeholder="Mot de passe (min 6 caractères)" autocomplete="current-password">
    <button id="login-btn" class="btn">Se connecter</button>
    <div class="login-divider">ou</div>
    <button id="signup-btn" class="btn btn-ghost">Créer un compte</button>
    <div class="login-toggle">
      <span style="color:var(--text-3);font-size:11px" id="login-version">SGRR&LAW</span>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-shell">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="user-chip">
          <div class="avatar" id="user-avatar">?</div>
          <div class="user-info">
            <div class="user-name" id="user-name">Utilisateur</div>
            <div class="user-role">En ligne</div>
          </div>
        </div>
        <button class="icon-btn" id="logout-btn" title="Déconnexion">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>

      <div class="sidebar-search">
        <div class="search-box">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input id="search" placeholder="Rechercher...">
        </div>
      </div>

      <div class="sidebar-section" style="flex:1;overflow-y:auto">
        <div class="section-title">
          <span>Pages</span>
          <button id="add-page-btn" title="Nouvelle page">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          </button>
        </div>
        <div id="page-list"></div>
      </div>

      <div class="sidebar-footer" style="flex-direction:column;align-items:stretch;gap:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="collab-list" id="collab-list" style="flex:1"></div>
          <span style="font-size:11px;color:var(--text-3)" id="collab-count">Solo</span>
        </div>
        <div id="version-badge" title="Cliquer pour voir le changelog" style="font-size:10px;color:var(--text-3);cursor:pointer;padding:6px 8px;background:var(--bg-3);border-radius:6px;text-align:center;border:1px solid var(--border)">
          <span id="version-text">v• chargement...</span>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="main-header">
        <button class="icon-btn menu-btn" id="menu-btn">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="breadcrumb" id="breadcrumb">SGRR&LAW</div>
        <div class="header-actions">
          <div class="live-indicator">
            <div class="live-dot"></div>
            <span id="sync-status">Local</span>
          </div>
        </div>
      </header>

      <div class="editor" id="editor">
        <div class="empty-state">
          <h2>👋 Bienvenue dans SGRR&LAW</h2>
          <p>Crée ta première page pour commencer</p>
          <button class="btn" style="max-width:240px" onclick="createPage()">+ Nouvelle page</button>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="slash-menu" id="slash-menu"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ============ FIREBASE CONFIG ============
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCuW_zyfd47vDaqXYvRLifJStHcJ9icxuQ",
  authDomain: "robot-validation-produit.firebaseapp.com",
  projectId: "robot-validation-produit",
  storageBucket: "robot-validation-produit.firebasestorage.app",
  messagingSenderId: "286183181940",
  appId: "1:286183181940:web:5f4a681c5c83274b5ecb21"
};
const FIREBASE_ENABLED = true;

const firebaseApp = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(firebaseApp);
const db = getFirestore(firebaseApp);

// ============ STATE ============
let state = {
  user: null,
  pages: [],
  currentPageId: null,
  blocks: {},
};

// ============ STORAGE ============
const Storage = {
  load() {
    try {
      const data = localStorage.getItem('sgrr-law-data');
      if (data) {
        const parsed = JSON.parse(data);
        state.pages = parsed.pages || [];
        state.blocks = parsed.blocks || {};
      }
    } catch(e) { console.error(e); }
  },
  save() {
    try {
      localStorage.setItem('sgrr-law-data', JSON.stringify({
        pages: state.pages,
        blocks: state.blocks,
      }));
    } catch(e) { console.error(e); }
  },
  loadUser() {
    try {
      const u = localStorage.getItem('sgrr-law-user');
      if (u) return JSON.parse(u);
    } catch(e){}
    return null;
  },
  saveUser(u) { localStorage.setItem('sgrr-law-user', JSON.stringify(u)); },
  clearUser() { localStorage.removeItem('sgrr-law-user'); }
};

// ============ AUTH ============
function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) return showLoginError('Email et mot de passe requis');
  if (password.length < 6) return showLoginError('Mot de passe trop court (6+)');
  try {
    document.getElementById('login-btn').textContent = 'Connexion...';
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) {
    document.getElementById('login-btn').textContent = 'Se connecter';
    const msgs = { 'auth/user-not-found': 'Compte introuvable', 'auth/wrong-password': 'Mot de passe incorrect', 'auth/invalid-credential': 'Email ou mot de passe incorrect' };
    showLoginError(msgs[e.code] || e.message);
  }
}

async function signup() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !email.includes('@')) return showLoginError('Email invalide');
  if (password.length < 6) return showLoginError('Mot de passe min 6 caractères');
  try {
    document.getElementById('signup-btn').textContent = 'Création...';
    await createUserWithEmailAndPassword(auth, email, password);
  } catch(e) {
    document.getElementById('signup-btn').textContent = 'Créer un compte';
    const msgs = { 'auth/email-already-in-use': 'Email déjà utilisé', 'auth/weak-password': 'Mot de passe trop faible' };
    showLoginError(msgs[e.code] || e.message);
  }
}

async function logout() {
  await signOut(auth);
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  document.getElementById('login-btn').textContent = 'Se connecter';
  document.getElementById('signup-btn').textContent = 'Créer un compte';
  const name = state.user.email.split('@')[0];
  document.getElementById('user-avatar').textContent = name.substring(0,2).toUpperCase();
  document.getElementById('user-name').textContent = name;
  Storage.load();
  renderPages();
  if (state.pages.length === 0) {
    createPage('🎬 Idées de Série', '🎬');
  } else if (state.pages[0]) {
    openPage(state.pages[0].id);
  }
}

// Firebase auth state listener — auto-login/logout
onAuthStateChanged(auth, (firebaseUser) => {
  if (firebaseUser) {
    state.user = { email: firebaseUser.email, id: firebaseUser.uid };
    showApp();
  } else {
    state.user = null;
    document.getElementById('app').classList.remove('show');
    document.getElementById('login-screen').style.display = 'flex';
  }
});

// ============ PAGES ============
function createPage(title = 'Nouvelle page', icon = '📄') {
  const id = 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
  const page = { id, title, icon, createdAt: Date.now() };
  state.pages.unshift(page);
  state.blocks[id] = [{ id: 'b_'+Date.now(), type: 'p', content: '' }];
  Storage.save();
  renderPages();
  openPage(id);
}

function deletePage(id) {
  if (!confirm('Supprimer cette page ?')) return;
  state.pages = state.pages.filter(p => p.id !== id);
  delete state.blocks[id];
  if (state.currentPageId === id) {
    state.currentPageId = state.pages[0]?.id || null;
  }
  Storage.save();
  renderPages();
  if (state.currentPageId) openPage(state.currentPageId);
  else showEmpty();
  toast('Page supprimée');
}

function openPage(id) {
  state.currentPageId = id;
  renderPages();
  renderEditor();
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

function renderPages() {
  const list = document.getElementById('page-list');
  const search = document.getElementById('search').value.toLowerCase();
  const filtered = state.pages.filter(p =>
    !search || p.title.toLowerCase().includes(search)
  );
  list.innerHTML = filtered.map(p => `
    <div class="page-item ${p.id === state.currentPageId ? 'active' : ''}" data-id="${p.id}">
      <span class="page-icon">${p.icon}</span>
      <span class="page-name">${escapeHtml(p.title || 'Sans titre')}</span>
      <div class="page-actions">
        <button onclick="event.stopPropagation();deletePage('${p.id}')" title="Supprimer">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3"/></svg>
        </button>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('.page-item').forEach(el => {
    el.onclick = () => openPage(el.dataset.id);
  });
}

function showEmpty() {
  document.getElementById('editor').innerHTML = `
    <div class="empty-state">
      <h2>👋 Aucune page</h2>
      <p>Crée ta première page pour commencer</p>
      <button class="btn" style="max-width:240px" onclick="createPage()">+ Nouvelle page</button>
    </div>
  `;
  document.getElementById('breadcrumb').textContent = 'SGRR&LAW';
}

// ============ EDITOR ============
function renderEditor() {
  const page = state.pages.find(p => p.id === state.currentPageId);
  if (!page) return showEmpty();
  document.getElementById('breadcrumb').textContent = page.title || 'Sans titre';
  const blocks = state.blocks[page.id] || [];
  const editor = document.getElementById('editor');
  editor.innerHTML = `
    <div class="editor-cover"></div>
    <div class="editor-content">
      <div class="page-icon-big" id="page-icon-big">${page.icon}</div>
      <textarea class="page-title" id="page-title" rows="1" placeholder="Sans titre">${escapeHtml(page.title || '')}</textarea>
      <div class="block-list" id="block-list">
        ${blocks.map(b => renderBlock(b)).join('')}
      </div>
    </div>
  `;
  setupTitleAutoresize();
  setupBlocks();
  setupIconPicker();
}

function renderBlock(block) {
  const checkbox = block.type === 'todo' ? '<div class="block-checkbox"></div>' : '';
  const placeholder = getPlaceholder(block.type);
  const doneClass = block.type === 'todo' && block.done ? 'done' : '';
  return `
    <div class="block ${doneClass}" data-id="${block.id}" data-type="${block.type}">
      <div class="block-handle">
        <button class="handle-btn" onclick="addBlockBelow('${block.id}')" title="Ajouter">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        </button>
      </div>
      ${checkbox}
      <div class="block-content" contenteditable="true" data-placeholder="${placeholder}">${escapeHtml(block.content || '')}</div>
    </div>
  `;
}

function getPlaceholder(type) {
  const map = {
    p: "Tapez '/' pour insérer un bloc",
    h1: 'Titre principal',
    h2: 'Sous-titre',
    h3: 'Petit titre',
    bullet: 'Liste',
    todo: 'À faire',
    quote: 'Citation',
    callout: '💡 Note importante',
  };
  return map[type] || '';
}

function setupTitleAutoresize() {
  const t = document.getElementById('page-title');
  if (!t) return;
  const resize = () => { t.style.height='auto'; t.style.height = t.scrollHeight + 'px'; };
  resize();
  t.addEventListener('input', () => {
    resize();
    const page = state.pages.find(p => p.id === state.currentPageId);
    if (page) {
      page.title = t.value;
      Storage.save();
      renderPages();
      document.getElementById('breadcrumb').textContent = t.value || 'Sans titre';
    }
  });
  t.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const firstBlock = document.querySelector('.block-content');
      if (firstBlock) firstBlock.focus();
    }
  });
}

function setupIconPicker() {
  const icon = document.getElementById('page-icon-big');
  if (!icon) return;
  icon.onclick = () => {
    const newIcon = prompt('Choisir un emoji :', icon.textContent.trim());
    if (newIcon) {
      const page = state.pages.find(p => p.id === state.currentPageId);
      if (page) {
        page.icon = newIcon;
        Storage.save();
        renderPages();
        renderEditor();
      }
    }
  };
}

function setupBlocks() {
  document.querySelectorAll('.block').forEach(block => {
    const content = block.querySelector('.block-content');
    const checkbox = block.querySelector('.block-checkbox');
    if (checkbox) {
      checkbox.onclick = () => {
        const blockId = block.dataset.id;
        const b = getBlock(blockId);
        if (b) {
          b.done = !b.done;
          block.classList.toggle('done');
          Storage.save();
        }
      };
    }
    content.addEventListener('input', () => {
      const blockId = block.dataset.id;
      const b = getBlock(blockId);
      if (b) {
        b.content = content.textContent;
        Storage.save();
        if (content.textContent === '/') {
          showSlashMenu(content);
        } else {
          hideSlashMenu();
        }
      }
    });
    content.addEventListener('keydown', e => handleBlockKey(e, block, content));
  });
}

function getBlock(id) {
  const blocks = state.blocks[state.currentPageId] || [];
  return blocks.find(b => b.id === id);
}

function handleBlockKey(e, block, content) {
  const blockId = block.dataset.id;
  const blocks = state.blocks[state.currentPageId];
  const idx = blocks.findIndex(b => b.id === blockId);
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    addBlockBelow(blockId);
  } else if (e.key === 'Backspace' && content.textContent === '' && blocks.length > 1) {
    e.preventDefault();
    blocks.splice(idx, 1);
    Storage.save();
    renderEditor();
    setTimeout(() => {
      const prev = document.querySelectorAll('.block-content')[Math.max(0,idx-1)];
      if (prev) {
        prev.focus();
        const range = document.createRange();
        range.selectNodeContents(prev);
        range.collapse(false);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
    }, 10);
  } else if (e.key === 'ArrowUp' && idx > 0) {
    const prev = document.querySelectorAll('.block-content')[idx-1];
    if (prev) { e.preventDefault(); prev.focus(); }
  } else if (e.key === 'ArrowDown' && idx < blocks.length - 1) {
    const next = document.querySelectorAll('.block-content')[idx+1];
    if (next) { e.preventDefault(); next.focus(); }
  }
}

function addBlockBelow(afterId) {
  const blocks = state.blocks[state.currentPageId];
  const idx = blocks.findIndex(b => b.id === afterId);
  const newBlock = { id: 'b_'+Date.now(), type: 'p', content: '' };
  blocks.splice(idx + 1, 0, newBlock);
  Storage.save();
  renderEditor();
  setTimeout(() => {
    const newEl = document.querySelector(`[data-id="${newBlock.id}"] .block-content`);
    if (newEl) newEl.focus();
  }, 10);
}

function changeBlockType(blockId, newType) {
  const block = getBlock(blockId);
  if (!block) return;
  block.type = newType;
  block.content = block.content.replace(/^\//, '');
  Storage.save();
  renderEditor();
  setTimeout(() => {
    const el = document.querySelector(`[data-id="${blockId}"] .block-content`);
    if (el) el.focus();
  }, 10);
}

// ============ SLASH MENU ============
const SLASH_OPTIONS = [
  { type: 'p', icon: '📝', name: 'Texte', desc: 'Paragraphe simple' },
  { type: 'h1', icon: 'H₁', name: 'Titre 1', desc: 'Grand titre' },
  { type: 'h2', icon: 'H₂', name: 'Titre 2', desc: 'Titre moyen' },
  { type: 'h3', icon: 'H₃', name: 'Titre 3', desc: 'Petit titre' },
  { type: 'bullet', icon: '•', name: 'Liste', desc: 'Liste à puces' },
  { type: 'todo', icon: '☑', name: 'To-do', desc: 'Case à cocher' },
  { type: 'quote', icon: '❝', name: 'Citation', desc: 'Bloc de citation' },
  { type: 'callout', icon: '💡', name: 'Encadré', desc: 'Note importante' },
  { type: 'divider', icon: '—', name: 'Séparateur', desc: 'Ligne horizontale' },
];

let slashTarget = null;

function showSlashMenu(target) {
  slashTarget = target;
  const menu = document.getElementById('slash-menu');
  const rect = target.getBoundingClientRect();
  menu.style.top = (rect.bottom + window.scrollY + 4) + 'px';
  menu.style.left = (rect.left + window.scrollX) + 'px';
  menu.innerHTML = SLASH_OPTIONS.map(o => `
    <div class="slash-item" data-type="${o.type}">
      <div class="slash-icon">${o.icon}</div>
      <div class="slash-info">
        <div class="slash-name">${o.name}</div>
        <div class="slash-desc">${o.desc}</div>
      </div>
    </div>
  `).join('');
  menu.classList.add('show');
  menu.querySelectorAll('.slash-item').forEach(item => {
    item.onclick = () => {
      const blockEl = slashTarget.closest('.block');
      if (blockEl) changeBlockType(blockEl.dataset.id, item.dataset.type);
      hideSlashMenu();
    };
  });
}

function hideSlashMenu() {
  document.getElementById('slash-menu').classList.remove('show');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.slash-menu') && !e.target.closest('.block-content')) {
    hideSlashMenu();
  }
});

// ============ HELPERS ============
function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============ EVENT LISTENERS ============
document.getElementById('login-btn').onclick = login;
document.getElementById('signup-btn').onclick = signup;
document.getElementById('logout-btn').onclick = logout;
document.getElementById('add-page-btn').onclick = () => createPage();
document.getElementById('search').oninput = renderPages;

document.getElementById('menu-btn').onclick = () => {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('show');
};
document.getElementById('sidebar-overlay').onclick = () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
};

document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

let lastTap = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTap < 300) e.preventDefault();
  lastTap = now;

// ============ VERSION DISPLAY ============
async function loadVersion() {
  try {
    const res = await fetch('VERSION.json?t=' + Date.now());
    if (!res.ok) throw new Error();
    const v = await res.json();
    const txt = document.getElementById('version-text');
    const loginV = document.getElementById('login-version');
    const display = `${v.commit} • ${v.buildDateFR}`;
    if (txt) txt.textContent = display;
    if (loginV) loginV.textContent = `🚀 ${display}`;
    const badge = document.getElementById('version-badge');
    if (badge) badge.onclick = () => showChangelog();
  } catch(e) {
    const txt = document.getElementById('version-text');
    if (txt) txt.textContent = 'dev local';
  }
}

async function showChangelog() {
  try {
    const res = await fetch('CHANGELOG.md?t=' + Date.now());
    const md = await res.text();
    const html = md
      .replace(/^# (.+)$/gm, '<h2 style="font-size:20px;margin:0 0 16px">$1</h2>')
      .replace(/^## (.+)$/gm, '<h3 style="font-size:14px;color:var(--accent);margin:16px 0 4px">$1</h3>')
      .replace(/`([^`]+)`/g, '<code style="background:var(--bg-3);padding:2px 6px;border-radius:4px;font-size:12px">$1</code>')
      .replace(/\n\n/g, '</p><p style="margin:0 0 8px">')
      .replace(/^([^<\n].+)$/gm, '<p style="margin:0 0 8px;font-size:13px;color:var(--text-2)">$1</p>');
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px';
    overlay.innerHTML = `<div style="background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:600px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow)">${html}<button style="margin-top:16px;width:100%" class="btn" onclick="this.closest('div[style*=fixed]').remove()">Fermer</button></div>`;
    overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
    document.body.appendChild(overlay);
  } catch(e) { console.error(e); }
}

loadVersion();
</script>
